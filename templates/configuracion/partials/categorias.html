<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white dark:bg-darkPanel border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm p-5 space-y-4 h-fit">
        <h3 class="text-sm font-bold text-slate-800 dark:text-amber-400 border-b border-slate-100 dark:border-slate-800 pb-2">➕ Agregar Categoría</h3>
        <form hx-post="{% url 'panel_config_categorias' %}" hx-target="#tab-content" class="space-y-3">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-slate-400 dark:text-darkTextSub mb-1">Nombre de la Categoría:</label>
                <input type="text" name="nombre" required placeholder="Ej. Error de Servidor, Soporte Técnico"
                       class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 outline-none focus:ring-2 focus:ring-amber-500 transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 dark:bg-amber-500 dark:hover:bg-amber-600 text-white dark:text-slate-950 font-bold text-xs py-2 px-4 rounded-lg shadow-sm transition">
                Guardar Categoría
            </button>
        </form>
    </div>

    <div class="lg:col-span-2 bg-white dark:bg-darkPanel border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 dark:bg-darkBg/50 border-b border-slate-200 dark:border-slate-800 text-slate-400 dark:text-slate-400 text-[10px] font-bold uppercase tracking-wider">
                    <th class="py-3 px-4">ID</th>
                    <th class="py-3 px-4">Nombre de Categoría</th>
                    <th class="py-3 px-4 text-right">Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-800 text-xs text-slate-600 dark:text-slate-300">
                {% for cat in categorias %}
                <tr class="hover:bg-slate-50/50 dark:hover:bg-darkBg/40 transition">
                    <td class="py-3 px-4 font-mono font-bold text-slate-400 dark:text-darkTextSub">#{{ cat.id }}</td>
                    <td class="py-3 px-4 font-semibold text-slate-800 dark:text-slate-100">{{ cat.nombre }}</td>
                    <td class="py-3 px-4 text-right">
                        <button hx-post="{% url 'panel_config_categoria_eliminar' cat.id %}"
                                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                                hx-target="#tab-content"
                                hx-confirm="¿Estás seguro de que deseas eliminar esta categoría?"
                                class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-bold p-1 hover:underline text-[11px]">
                            🗑️ Eliminar
                        </button>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-6 text-slate-400 dark:text-darkTextSub/60">No hay categorías registradas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
