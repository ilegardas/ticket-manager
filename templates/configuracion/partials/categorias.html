<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5 space-y-4 h-fit">
        <h3 class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2">➕ Agregar Categoría</h3>
        <form hx-post="{% url 'panel_config_categorias' %}" hx-target="#tab-content" class="space-y-3">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Nombre de la Categoría:</label>
                <input type="text" name="nombre" required placeholder="Ej. Error de Servidor, Soporte Técnico"
                       class="w-full text-xs p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-xs py-2 px-4 rounded-lg shadow-sm transition">
                Guardar Categoría
            </button>
        </form>
    </div>

    <div class="lg:col-span-2 bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-slate-400 text-[10px] font-bold uppercase tracking-wider">
                    <th class="py-3 px-4">ID</th>
                    <th class="py-3 px-4">Nombre de Categoría</th>
                    <th class="py-3 px-4 text-right">Acciones</th> </tr>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 text-xs text-slate-600">
                {% for cat in categorias %}
                <tr class="hover:bg-slate-50/50">
                    <td class="py-3 px-4 font-mono font-bold text-slate-400">#{{ cat.id }}</td>
                    <td class="py-3 px-4 font-semibold text-slate-800">{{ cat.nombre }}</td>

                    <td class="py-3 px-4 text-right"> <button hx-post="{% url 'panel_config_categoria_eliminar' cat.id %}"
                                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                                hx-target="#tab-content"
                                hx-confirm="¿Estás seguro de que deseas eliminar esta categoría?"
                                class="text-red-500 hover:text-red-700 font-semibold p-1 hover:underline text-[11px]">
                            🗑️ Eliminar
                        </button>
                    </td>

                    
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center py-6 text-slate-400">No hay categorías registradas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
