<div class="space-y-6">
    <div class="bg-white dark:bg-darkPanel rounded-xl border border-slate-200 dark:border-slate-800 p-5 shadow-sm">
        <h4 class="text-sm font-semibold text-slate-800 dark:text-white mb-4 flex items-center gap-2">
            🔗 Asociar Responsable a Sistema (CMDB)
        </h4>
        
        <form hx-post="{% url 'panel_config_cmdb' %}" 
              hx-target="#tab-content" 
              class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end text-xs"
              onhtmx:after-request="this.reset()">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label class="block font-bold text-slate-400 uppercase tracking-wider text-[11px]">Empleado / Especialista:</label>
                <select name="usuario_id" required class="w-full p-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-1 focus:ring-amber-500">
                    <option value="">— Selecciona Personal —</option>
                    {% for u in usuarios_list %}
                    <option value="{{ u.id }}">{{ u.nombre_completo }} ({% if u.correo_electronico %}{{ u.correo_electronico }}{% else %}ID: {{ u.id }}{% endif %})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-1">
                <label class="block font-bold text-slate-400 uppercase tracking-wider text-[11px]">Ítem de Configuración (Sistema):</label>
                <select name="sistema_id" required class="w-full p-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-1 focus:ring-amber-500">
                    <option value="">— Selecciona Sistema —</option>
                    {% for s in sistemas_list %}
                    <option value="{{ s.id }}">{{ s.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-1">
                <label class="block font-bold text-slate-400 uppercase tracking-wider text-[11px]">Tipo de Responsabilidad:</label>
                <select name="tipo_relacion" required class="w-full p-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-1 focus:ring-amber-500">
                    <option value="lider_tecnico">Líder Técnico / Desarrollador</option>
                    <option value="product_owner">Product Owner / Enlace Proceso</option>
                    <option value="infraestructura">Administrador Servidores / DB</option>
                    <option value="soporte_n2">Soporte Nivel 2</option>
                </select>
            </div>

            <div>
                <button type="submit" class="w-full bg-slate-950 hover:bg-slate-800 dark:bg-amber-500 dark:hover:bg-amber-600 text-white dark:text-slate-950 font-bold py-2 px-4 rounded-lg shadow-sm transition">
                    ➕ Vincular Activo
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white dark:bg-darkPanel border border-slate-200 dark:border-slate-800 p-4 rounded-xl shadow-sm">
        <div class="relative w-full sm:w-96">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">🔍</span>
            <input type="text" 
                   name="q_cmdb" 
                   value="{{ q_cmdb|default:'' }}"
                   hx-get="{% url 'panel_config_cmdb' %}" 
                   hx-target="#cmdb-table-body" 
                   hx-trigger="keyup delay:300ms, search"
                   placeholder="Filtrar por sistema, responsable asignado o rol..." 
                   class="w-full text-xs pl-9 pr-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
        </div>
    </div>

    <div class="bg-white dark:bg-darkPanel rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
        <div class="p-4 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-darkBg/20">
            <h4 class="text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase tracking-wider">Matriz de Relaciones Activas</h4>
        </div>
        
        <div class="overflow-x-auto text-xs">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b border-slate-200 dark:border-slate-800 text-slate-400 font-semibold bg-slate-50/30 dark:bg-darkBg/10">
                        <th class="p-3">Sistema (CI)</th>
                        <th class="p-3">Responsable Asignado</th>
                        <th class="p-3">Rol Técnico</th>
                        <th class="p-3">Fecha Alta</th>
                        <th class="p-3 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="cmdb-table-body" class="divide-y divide-slate-100 dark:divide-slate-800 text-slate-700 dark:text-slate-300 font-medium">
                    {% include 'configuracion/partials/cmdb_rows.html' %}
                </tbody>
            </table>
        </div>
    </div>
</div>
