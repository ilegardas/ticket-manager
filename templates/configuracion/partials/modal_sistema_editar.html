<div class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4" id="modal-sistema-editar">
    <div class="bg-white dark:bg-darkPanel rounded-xl shadow-xl border border-slate-200 dark:border-slate-800 w-full max-w-4xl overflow-hidden animate-in fade-in zoom-in-95 duration-150">
        <div class="bg-slate-50 dark:bg-darkBg px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
            <h3 class="text-xs font-bold text-slate-800 dark:text-amber-400 uppercase tracking-wide">✏️ Editar Sistema: {{ sistema.nombre }}</h3>
            <button onclick="document.getElementById('modal-sistema-editar').remove()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white font-bold text-lg">×</button>
        </div>
        
        <form hx-post="{% url 'panel_config_sistema_actualizar' sistema.id %}" 
              hx-target="#tab-content"
              hx-on::after-request="if(event.detail.xhr.status === 200) document.getElementById('modal-sistema-editar').remove()"
              class="p-6 space-y-4 text-xs max-h-[80vh] overflow-y-auto">
            {% csrf_token %}
            
            <div class="bg-slate-50/50 dark:bg-darkBg/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/60 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Nombre del Sistema:</label>
                    <input type="text" name="nombre" value="{{ sistema.nombre }}" required class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2 font-medium">
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Versión Actual:</label>
                    <input type="text" name="version" value="{{ sistema.version|default_if_none:'' }}" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Formato de Despliegue:</label>
                    <input type="text" name="formato_sistema" value="{{ sistema.formato_sistema|default_if_none:'' }}" placeholder="Ej. Web, Servidor" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
                <div class="md:col-span-3">
                    <label class="block font-semibold text-slate-500 mb-1">Objetivo / Descripción:</label>
                    <textarea name="objetivo_descripcion" rows="2" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">{{ sistema.objetivo_descripcion|default_if_none:'' }}</textarea>
                </div>
            </div>

            <div class="bg-slate-50/50 dark:bg-darkBg/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/60 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Cifra de Usuarios:</label>
                    <input type="number" name="cifra_usuarios" value="{{ sistema.cifra_usuarios|default_if_none:'' }}" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">URL de Acceso / Recurso:</label>
                    <input type="text" name="acceso_recurso" value="{{ sistema.acceso_recurso|default_if_none:'' }}" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Servidor de Alojamiento:</label>
                    <input type="text" name="servidor_alojamiento" value="{{ sistema.servidor_alojamiento|default_if_none:'' }}" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Ubicación del Servidor:</label>
                    <input type="text" name="ubicacion_servidor" value="{{ sistema.ubicacion_servidor|default_if_none:'' }}" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Nombre de BD:</label>
                    <input type="text" name="nombre_bd" value="{{ sistema.nombre_bd|default_if_none:'' }}" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Stack Técnico / Lenguaje:</label>
                    <input type="text" name="informacion_tecnica" value="{{ sistema.informacion_tecnica|default_if_none:'' }}" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                </div>
            </div>

            <div class="bg-slate-50/50 dark:bg-darkBg/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/60 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Desarrollado Por (TI):</label>
                    <select name="desarrollado_por" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                        <option value="">— Sin asignar —</option>
                        {% for t in tecnicos %}
                        <option value="{{ t.id }}" {% if sistema.desarrollado_por_id == t.id %}selected{% endif %}>{{ t.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block font-semibold text-slate-500 mb-1">Responsable del Resguardo:</label>
                    <select name="responsable_resguardo" class="w-full bg-white dark:bg-darkBg border border-slate-200 dark:border-slate-800 rounded-lg p-2">
                        <option value="">— Sin asignar —</option>
                        {% for t in tecnicos %}
                        <option value="{{ t.id }}" {% if sistema.responsable_resguardo_id == t.id %}selected{% endif %}>{{ t.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="flex items-center gap-4 p-2">
                <label class="flex items-center gap-2 font-bold text-slate-700 dark:text-slate-300 cursor-pointer">
                    <input type="checkbox" name="activo" {% if sistema.activo %}checked{% endif %} class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                    Sistema Operativo / Activo en Triage
                </label>
            </div>

            <div class="flex justify-end gap-2 pt-3 border-t border-slate-100 dark:border-slate-800">
                <button type="button" onclick="document.getElementById('modal-sistema-editar').remove()" class="px-4 py-2 bg-slate-100 dark:bg-darkBg text-slate-600 dark:text-slate-300 hover:bg-slate-200 rounded-lg font-semibold">Cancelar</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold shadow-sm transition">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
