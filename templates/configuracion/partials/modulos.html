<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5 space-y-4 h-fit">
        <h3 class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2">➕ Agregar Módulo</h3>
        <form hx-post="{% url 'panel_config_modulos' %}" hx-target="#tab-content" class="space-y-3">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Sistema Perteneciente:</label>
                <select name="sistema" required class="w-full text-xs p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                    <option value="">Selecciona Sistema</option>
                    {% for sis in sistemas_list %}
                    <option value="{{ sis.id }}">{{ sis.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Nombre del Módulo:</label>
                <input type="text" name="nombre" required placeholder="Ej. Ventas, Facturación, Nómina"
                       class="w-full text-xs p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-xs py-2 px-4 rounded-lg shadow-sm transition">
                Guardar Módulo
            </button>
        </form>
    </div>

    <div class="lg:col-span-2 bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-slate-400 text-[10px] font-bold uppercase tracking-wider">
                    <th class="py-3 px-4">ID</th>
                    <th class="py-3 px-4">Módulo</th>
                    <th class="py-3 px-4">Sistema</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 text-xs text-slate-600">
                {% for mod in modulos %}
                <tr class="hover:bg-slate-50/50">
                    <td class="py-3 px-4 font-mono font-bold text-slate-400">#{{ mod.id }}</td>
                    <td class="py-3 px-4 font-semibold text-slate-800">{{ mod.nombre }}</td>
                    <td class="py-3 px-4 text-blue-600 font-medium bg-blue-50/20">{{ mod.sistema.nombre }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-6 text-slate-400">No hay módulos vinculados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
