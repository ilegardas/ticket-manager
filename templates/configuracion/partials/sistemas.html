<div class="space-y-6">
    <div class="bg-white dark:bg-darkPanel border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm p-6">
        <h3 class="text-sm font-bold text-slate-800 dark:text-amber-400 border-b border-slate-100 dark:border-slate-800 pb-3 mb-4 flex items-center gap-2">
            ➕ Registrar Sistema en Inventario de Gobernanza
        </h3>
        
        <form hx-post="{% url 'panel_config_sistemas' %}" hx-target="#tab-content" class="space-y-6 text-xs">
            {% csrf_token %}
            
            <div class="bg-slate-50/50 dark:bg-darkBg/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/60 space-y-4">
                <h4 class="font-bold text-slate-700 dark:text-slate-300 text-[11px] uppercase tracking-wider">📌 Identificación y Propósito</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Nombre del Sistema:</label>
                        <input type="text" name="nombre" required placeholder="Ej. Odoo, SIA, Intranet"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Versión Actual:</label>
                        <input type="text" name="version" placeholder="Ej. v18.0.2"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Formato / Arquitectura:</label>
                        <input type="text" name="formato_sistema" placeholder="Ej. Web App (SaaS), Desktop, On-Premise"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Objetivo y Descripción General:</label>
                        <textarea name="objetivo_descripcion" rows="2" placeholder="Describe brevemente el alcance e impacto institucional de este sistema..."
                                  class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition"></textarea>
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Cifra Est. Usuarios Activos:</label>
                        <input type="number" name="cifra_usuarios" placeholder="Ej. 450"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                </div>
            </div>

            <div class="bg-slate-50/50 dark:bg-darkBg/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/60 space-y-4">
                <h4 class="font-bold text-slate-700 dark:text-slate-300 text-[11px] uppercase tracking-wider">🌐 Infraestructura y Acceso Técnico</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">URL de Acceso / Recurso (IP):</label>
                        <input type="text" name="acceso_recurso" placeholder="Ej. https://migestion.pro o 192.168.1.50"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Servidor / Alojamiento (Hosting):</label>
                        <input type="text" name="servidor_alojamiento" placeholder="Ej. Railway, GCS, Hostinger, Local"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Ubicación Física / Región Nube:</label>
                        <input type="text" name="ubicacion_servidor" placeholder="Ej. US-East (Nube), SITE Central SEECH"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Nombre Físico de Base de Datos:</label>
                        <input type="text" name="nombre_bd" placeholder="Ej. db_odoo_prod"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">Información Técnica / Stack Tecnológico:</label>
                        <input type="text" name="informacion_tecnica" placeholder="Ej. Python 3.13, Django 5.1, PostgreSQL, Tailwind, HTMX"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                </div>
            </div>

            <div class="bg-slate-50/50 dark:bg-darkBg/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/60 space-y-4">
                <h4 class="font-bold text-slate-700 dark:text-slate-300 text-[11px] uppercase tracking-wider">👥 Responsabilidades y Gobernancia</h4>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">🛠️ Desarrollado Por:</label>
                        <select name="desarrollado_por" class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition font-medium">
                            <option value="">-- Seleccionar Área / Desarrollador --</option>
                            {% for tec in tecnicos %}
                            <option value="{{ tec.id }}">{{ tec.nombre_completo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">💾 Custodio / Resguardo de Código:</label>
                        <select name="responsable_resguardo" class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition font-medium">
                            <option value="">-- Seleccionar Responsable Fuertemente Asignado --</option>
                            {% for tec in tecnicos %}
                            <option value="{{ tec.id }}">{{ tec.nombre_completo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">🔗 Enlace a Documentación / Git:</label>
                        <input type="text" name="documentacion" placeholder="Ej. https://github.com/seech/repo o enlace a Drive"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                </div>
            </div>

            <div class="bg-slate-50/50 dark:bg-darkBg/30 p-4 rounded-xl border border-slate-100 dark:border-slate-800/60 space-y-4">
                <h4 class="font-bold text-slate-700 dark:text-slate-300 text-[11px] uppercase tracking-wider">🔒 Políticas de Continuidad y Respaldo</h4>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">📅 Frecuencia de Respaldo:</label>
                        <input type="text" name="fecha_respaldo" placeholder="Ej. Diaria a las 02:00 AM"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb-1">📦 Formato del Respaldo:</label>
                        <input type="text" name="formato_respaldo" placeholder="Ej. .SQL Dump, Compressed TAR"
                               class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
                    </div>
                    <div>
                        <label class="block font-semibold text-slate-500 dark:text-darkTextSub mb
