<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-5 space-y-4 h-fit">
        <h3 class="text-sm font-bold text-slate-800 border-b border-slate-100 pb-2">➕ Agregar Sistema</h3>
        <form hx-post="{% url 'panel_config_sistemas' %}" hx-target="#tab-content" class="space-y-3">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Nombre del Sistema:</label>
                <input type="text" name="nombre" required placeholder="Ej. Odoo, SIA, Intranet"
                       class="w-full text-xs p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex items-center">
                <input type="checkbox" name="activo" id="sis-activo" checked class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                <label Sve for="sis-activo" class="ml-2 text-xs font-medium text-slate-600">Sistema Activo</label>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-xs py-2 px-4 rounded-lg shadow-sm transition">
                Guardar Sistema
            </button>
        </form>
    </div>

    <div class="lg:col-span-2 bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200 text-slate-400 text-[10px] font-bold uppercase tracking-wider">
                    <th class="py-3 px-4">ID</th>
                    <th class="py-3 px-4">Nombre</th>
                    <th class="py-3 px-4 text-center">Estado</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 text-xs text-slate-600">
                {% for sis in sistemas %}
                <tr class="hover:bg-slate-50/50">
                    <td class="py-3 px-4 font-mono font-bold text-slate-400">#{{ sis.id }}</td>
                    <td class="py-3 px-4 font-semibold text-slate-800">{{ sis.nombre }}</td>
                    <td class="py-3 px-4 text-center">
                        {% if sis.activo %}
                        <span class="inline-flex items-center rounded-full bg-emerald-50 px-2 py-0.5 text-[10px] font-bold text-emerald-700 border border-emerald-200">Activo</span>
                        {% else %}
                        <span class="inline-flex items-center rounded-full bg-slate-50 px-2 py-0.5 text-[10px] font-bold text-slate-500 border border-slate-200">Inactivo</span>
                        {% endif %}
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-6 text-slate-400">No hay sistemas registrados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
