<div class="p-6 space-y-4">
    <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-3">
        <h3 class="text-sm font-bold text-slate-900 dark:text-amber-400 uppercase tracking-wide">💡 Redactar Entrada de Conocimiento</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white font-bold text-sm">✕</button>
    </div>

    <form hx-post="{% url 'panel_conocimiento_crear' %}" class="space-y-4 text-xs">
        {% csrf_token %}
        <div>
            <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Título de la Solución</label>
            <input type="text" name="titulo" required placeholder="Ej. Solución al bloqueo de folios en Odoo 18"
                   class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Sistema Vinculado</label>
                <select name="sistema" class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none">
                    <option value="">— Ninguno (General) —</option>
                    {% for sis in sistemas %} <option value="{{ sis.id }}">{{ sis.nombre }}</option> {% endfor %}
                </select>
            </div>
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Código de Error (Si aplica)</label>
                <input type="text" name="codigo_error" placeholder="Ej. UserError 403"
                       class="w-full font-mono p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none">
            </div>
        </div>

        <div>
            <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Síntomas / Problema Detectado</label>
            <textarea name="descripcion_problema" rows="3" required placeholder="Describe los síntomas o fallos reportados..."
                      class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none resize-none"></textarea>
        </div>

        <div>
            <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Procedimiento de Solución Aplicada</label>
            <textarea name="solucion_aplicada" rows="4" required placeholder="Escribe el paso a paso detallado para resolver el incidente..."
                      class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none resize-none"></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-3 border-t border-slate-100 dark:border-slate-800">
            <button type="button" onclick="closeModal()" class="px-4 py-2 bg-slate-100 dark:bg-darkBg text-slate-600 dark:text-slate-300 rounded-lg font-semibold">Cancelar</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 dark:bg-amber-500 text-white dark:text-slate-950 rounded-lg font-bold">Documentar Solución</button>
        </div>

        <!-- 🎥 NUEVA SECCIÓN: RECURSOS DIGITALES Y MULTIMEDIA -->
        <div class="border-t border-slate-200 dark:border-slate-800 pt-3 space-y-3">
            <h4 class="text-[11px] font-bold text-amber-500 uppercase tracking-wider">📦 Recursos Digitales y Soporte</h4>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                    <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1 text-[10px]">Enlace a Videotutorial (Loom / Drive / YT)</label>
                    <input type="url" name="video_url" placeholder="https://loom.com/share/..."
                           class="w-full text-xs p-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-200 outline-none focus:ring-1 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1 text-[10px]">Enlace a Manual o PDF Oficial</label>
                    <input type="url" name="documento_url" placeholder="https://drive.google.com/..."
                           class="w-full text-xs p-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-200 outline-none focus:ring-1 focus:ring-amber-500">
                </div>
            </div>
            
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1 text-[10px]">Palabras Clave / Tags de Búsqueda</label>
                <input type="text" name="palabras_clave" placeholder="ej. borrar, carpetas, permisos, windows"
                       class="w-full text-xs p-2 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-200 outline-none focus:ring-1 focus:ring-amber-500">
            </div>
        </div>

        
    </form>
</div>
