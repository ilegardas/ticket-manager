<tr id="dept-row-{{ d.id }}" class="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50/50 dark:hover:bg-darkBg/20 transition text-[11px]">
    <td class="py-3 px-4 font-mono text-slate-400">#{{ d.id }}</td>
    <td class="py-3 px-4 font-bold text-slate-800 dark:text-slate-200">{{ d.nombre }}</td>
    <td class="py-3 px-4">
        {% if d.activo %}
            <span class="px-2 py-0.5 bg-green-50 text-green-700 dark:bg-green-500/10 dark:text-green-400 rounded-full font-medium">Activo</span>
        {% else %}
            <span class="px-2 py-0.5 bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400 rounded-full font-medium">Archivado</span>
        {% endif %}
    </td>
    <td class="py-3 px-4 font-mono text-slate-400">{{ d.fecha_creacion|date:"Y-m-d" }}</td>
    <td class="py-3 px-4 text-right">
        <button hx-get="{% url 'departamento_editar' d.id %}" hx-target="#modal-container" hx-swap="innerHTML" onclick="openModal()"
                class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded font-medium transition">
            ✏️ Editar
        </button>
    </td>
</tr>
