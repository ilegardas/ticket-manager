<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ticket Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="h-full text-slate-900 antialiased font-sans flex flex-col md:flex-row">

    <div class="md:hidden bg-slate-950 text-white p-4 flex justify-between items-center border-b border-slate-800">
        <span class="font-bold tracking-tight text-sm">TicketManager</span>
        <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="text-slate-400 hover:text-white focus:outline-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-950 text-slate-200 transform -translate-x-full md:translate-x-0 md:static md:h-full transition-transform duration-300 ease-in-out flex flex-col border-r border-slate-800 shadow-xl">
        <div class="p-6 border-b border-slate-800 flex items-center space-x-2">
            <div class="h-7 w-7 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white text-sm">T</div>
            <span class="font-bold tracking-tight text-lg text-white">TicketManager</span>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-1">
            <a href="{% url 'panel_dashboard' %}" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-900 hover:text-white transition">
                <svg class="mr-3 h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a href="{% url 'panel_tickets_list' %}" class="flex items-center px-4 py-2.5 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-900 hover:text-white transition">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Tickets
            </a>
        </nav>

        <div class="p-4 border-t border-slate-800 flex items-center justify-between text-xs text-slate-400">
            <div class="truncate max-w-[140px]">
                <p class="font-semibold text-slate-200 truncate">{{ request.user.username }}</p>
            </div>
            <a href="/admin/logout/" class="hover:text-red-400 font-medium transition">Salir</a>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto bg-slate-50">
        <div class="container mx-auto p-4 md:p-8 max-w-7xl">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
