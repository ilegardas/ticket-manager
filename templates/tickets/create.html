{% extends 'layouts/base.html' %}

{% block title %}Nuevo Ticket - Ticket Manager{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
    <div>
        <a href="{% url 'panel_tickets_list' %}" class="inline-flex items-center text-xs font-semibold text-slate-500 hover:text-slate-900 transition">
            ← Cancelar y volver
        </a>
    </div>

    <div class="border-b border-slate-200 pb-4">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Crear Nuevo Ticket</h1>
        <p class="text-sm text-slate-500">Registra un nuevo incidente en la mesa de ayuda.</p>
    </div>

    <form method="POST" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Título del Incidente *</label>
            <input type="text" name="titulo" required placeholder="Ej. Error de conexión en módulo de nómina al timbrar" 
                   class="w-full text-sm p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Descripción Detallada *</label>
            <textarea name="descripcion" rows="4" required placeholder="Describe paso a paso la falla o requerimiento presentado por el usuario..." 
                      class="w-full text-sm p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Sistema Afectado</label>
                <select name="sistema" class="w-full text-sm p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">Selecciona un sistema</option>
                    {% for sis in sistemas %}
                    <option value="{{ sis.id }}">{{ sis.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Prioridad Inicial</label>
                <select name="prioridad" class="w-full text-sm p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    {% for prio in prioridades %}
                    <option value="{{ prio.id }}" {% if prio.orden == 0 %}selected{% endif %}>{{ prio.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Código de Error (Opcional)</label>
                <input type="text" name="codigo_error" placeholder="Ej. ERR-502-DB" 
                       class="w-full text-sm p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Medio de Ingreso</label>
                <select name="medio_ingreso" class="w-full text-sm p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="portal" selected>Portal Web</option>
                    <option value="correo">Correo</option>
                    <option value="telefono">Teléfono</option>
                    <option value="oficio">Oficio</option>
                </select>
            </div>
        </div>

        <div class="flex items-center justify-end space-x-3 border-t border-slate-100 pt-4">
            <a href="{% url 'panel_tickets_list' %}" class="px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition">
                Cancelar
            </a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm px-5 py-2 rounded-lg shadow-sm transition">
                Levantar Ticket
            </button>
        </div>
    </form>
</div>
{% endblock %}
