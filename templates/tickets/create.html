{% extends 'layouts/base.html' %}

{% block title %}Levantar Nuevo Ticket - Ticket Manager{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
    
    <div class="flex items-center justify-between">
        <a href="{% url 'panel_tickets_list' %}" class="inline-flex items-center text-xs font-semibold text-slate-500 dark:text-darkTextSub hover:text-slate-900 dark:hover:text-amber-400 transition">
            ← Cancelar y volver a la mesa
        </a>
    </div>

    <div class="border-b border-slate-200 dark:border-slate-800 pb-4">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-amber-400">Levantar Nuevo Ticket</h1>
        <p class="text-sm text-slate-500 dark:text-slate-300">Registra un nuevo incidente técnico en la mesa de ayuda.</p>
    </div>

    <form action="{% url 'panel_ticket_create' %}" method="POST" class="bg-white dark:bg-darkPanel border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm p-6 space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Título Corto de la Incidencia / Resumen</label>
            <input type="text" name="titulo" required placeholder="Ej. Error de timbrado en nómina o bloqueo de cuenta..." 
                   class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500 transition">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Sistema Integrado</label>
                <select name="sistema" required 
                        hx-get="{% url 'ajax_cargar_modulos' %}" hx-target="#select-modulo-create" hx-trigger="change"
                        class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="">— Selecciona —</option>
                    {% for sis in sistemas %}
                    <option value="{{ sis.id }}">{{ sis.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Módulo Afectado</label>
                <select name="modulo" id="select-modulo-create" required 
                        class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="">— Selecciona Sistema Primero —</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Categoría del Fallo</label>
                <select name="categoria" required 
                        class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="">— Selecciona —</option>
                    {% for cat in categorias %}
                    <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Prioridad Solicitada</label>
                <select name="prioridad" required 
                        class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-amber-500">
                    {% for pri in prioridades %}
                    <option value="{{ pri.id }}" {% if pri.orden == 3 %}selected{% endif %}>{{ pri.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Medio de Ingreso</label>
                <select name="medio_ingreso" required 
                        class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="portal" selected>💻 Portal Web / Sistema</option>
                    <option value="correo">📧 Correo Electrónico</option>
                    <option value="llamada">📞 Llamada Telefónica</option>
                    <option value="oficio">📄 Oficio Institucional</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Impacto Operativo</label>
                <select name="impacto" required 
                        class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="funcional" selected>🟢 Funcional (Detalle menor)</option>
                    <option value="parcial">🟡 Parcialmente Funcional (Trabaja lento)</option>
                    <option value="caido_total">🔴 Caído Total (Bloqueo absoluto)</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Código o Traza de Error (Opcional)</label>
            <input type="text" name="codigo_error" placeholder="Ej. Odoo Exception: UserError / Traceback log..." 
                   class="w-full font-mono text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 placeholder-slate-400 outline-none focus:ring-2 focus:ring-amber-500 transition">
        </div>

        <div>
            <label class="block text-xs font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Descripción Detallada del Problema</label>
            <textarea name="descripcion" rows="5" required placeholder="Describe paso a paso las acciones previas al fallo y los síntomas detectados..." 
                      class="w-full text-xs p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 placeholder-slate-400 outline-none resize-none focus:ring-2 focus:ring-amber-500 transition"></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-3 border-t border-slate-100 dark:border-slate-800">
            <a href="{% url 'panel_tickets_list' %}" class="px-5 py-2.5 bg-slate-100 dark:bg-darkBg text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg text-xs font-semibold transition">
                Cancelar
            </a>
            <button type="submit" class="px-5 py-2.5 bg-slate-950 dark:bg-amber-500 hover:bg-slate-800 dark:hover:bg-amber-600 text-white dark:text-slate-950 rounded-lg text-xs font-bold shadow-sm transition">
                🚀 Crear Ticket y Generar Folio
            </button>
        </div>
    </form>
</div>
{% endblock %}
