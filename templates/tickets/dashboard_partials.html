<div id="dashboard-contenido" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">

                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Tickets</p>

            </div>
            <div class="bg-blue-500/10 p-2 rounded-lg text-blue-400 font-mono text-sm w-8 h-8 flex items-center justify-center">
                ∑
            </div>
        </div>
    </div>

    <div class="bg-[#1e232d] p-4 rounded-xl border border-slate-800 shadow-xs">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Pendientes</p>
                <h3 class="text-2xl font-bold text-amber-500 mt-1">{{ pendientes }}</h3>
            </div>
            <div class="bg-amber-500/10 p-2 rounded-lg text-amber-500 text-sm w-8 h-8 flex items-center justify-center">
                ⏳
            </div>
        </div>
    </div>

    <div class="bg-[#1e232d] p-4 rounded-xl border border-slate-800 shadow-xs">

            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Resueltos / Cerrados</p>
                <h3 class="text-2xl font-bold text-emerald-500 mt-1">{{ resueltos }}</h3>
            </div>
            <div class="bg-emerald-500/10 p-2 rounded-lg text-emerald-500 text-sm w-8 h-8 flex items-center justify-center">
                ✓
            </div>
        </div>
    </div>

    <div class="bg-[#1e232d] p-4 rounded-xl border border-slate-800 shadow-xs">
        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">SLA Cumplido</p>
                <h3 class="text-2xl font-bold text-blue-400 mt-1">{{ sla_porcentaje }}%</h3>
            </div>
            <div class="bg-cyan-500/10 p-2 rounded-lg text-cyan-400 text-sm w-8 h-8 flex items-center justify-center">
                ⚡
            </div>
        </div>
    </div>

            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Tendencia de Creación de Tickets</h4>
            <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-mono">Historial Temporal</span>
        </div>
        
        <div class="relative min-h-[260px] flex items-center justify-center bg-[#13161c]/30 rounded-lg border border-dashed border-slate-800/60 p-4">
            <div id="grafica-tendencia-container" class="w-full h-full">
                <p class="text-xs text-slate-500 text-center italic">Renderizando gráfica lineal...</p>
            </div>
        </div>
    </div>

    <div class="col-span-1 bg-[#1e232d] p-5 rounded-xl border border-slate-800">
        <div class="flex items-center justify-between mb-4">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Tickets por Estado</h4>
            <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-mono">Distribución</span>
        </div>
        
        <div class="relative min-h-[260px] flex items-center justify-center bg-[#13161c]/30 rounded-lg border border-dashed border-slate-800/60 p-4">
            <div id="grafica-dona-container" class="w-full h-full flex items-center justify-center">
                <p class="text-xs text-slate-500 text-center italic">Renderizando estados...</p>
            </div>
        </div>
    </div>

</div>
