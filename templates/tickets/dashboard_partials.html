<div id="dashboard-contenido-dinamico" class="space-y-6 w-full">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">Tendencia de Incidencias</h3>
            <div class="h-64"><canvas id="chartTendencias"></canvas></div>
        </div>

        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">Distribución por Estado</h3>
            <div class="h-64"><canvas id="chartEstados"></canvas></div>
        </div>

        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">Tickets por Sistema Integrado</h3>
            <div class="h-64"><canvas id="chartSistemas"></canvas></div>
        </div>

        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">Criticidad y Prioridades</h3>
            <div class="h-64"><canvas id="chartPrioridades"></canvas></div>
        </div>

        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">Carga de Trabajo por Especialista (Activos)</h3>
            <div class="h-64"><canvas id="chartCarga"></canvas></div>
        </div>

        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">Tiempo Promedio de Solución (Horas)</h3>
            <div class="h-64"><canvas id="chartTiempos"></canvas></div>
        </div>

        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">% Cumplimiento de SLA por Agente</h3>
            <div class="h-64"><canvas id="chartSlaAgentes"></canvas></div>
        </div>

        <div class="bg-white dark:bg-darkPanel p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xs">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 mb-4">Nivel de Impacto por Sistema</h3>
            <div class="h-64"><canvas id="chartImpactoSistemas"></canvas></div>
        </div>

    </div>

    <script>
        (function() {
            const isDark = document.documentElement.classList.contains('dark');
            const labelColor = isDark ? '#94a3b8' : '#64748b';
            const gridColor = isDark ? '#334155' : '#f1f5f9';

            const chartDefaults = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: labelColor, font: { family: 'Inter', size: 11 } } } },
                scales: {
                    x: { grid: { color: gridColor }, ticks: { color: labelColor, font: { family: 'Inter' } } },
                    y: { grid: { color: gridColor }, ticks: { color: labelColor, font: { family: 'Inter' } } }
                }
            };

            function limpiarYCrearChart(chartId, config) {
                if (window.misGraficasActivas && window.misGraficasActivas[chartId]) {
                    window.misGraficasActivas[chartId].destroy();
                }
                const canvasElement = document.getElementById(chartId);
                if (canvasElement) {
                    const ctx = canvasElement.getContext('2d');
                    window.misGraficasActivas[chartId] = new Chart(ctx, config);
                }
            }

            // 1. Tendencias
            limpiarYCrearChart('chartTendencias', {
                type: 'line',
                data: {
                    labels: {{ tendencias_labels|safe|default:"[]" }},
                    datasets: [{
                        label: 'Tickets',
                        data: {{ tendencias_valores|safe|default:"[]" }},
                        borderColor: '#3B82F6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true, tension: 0.3, borderWidth: 2
                    }]
                }, options: chartDefaults
            });

            // 2. Estados
            limpiarYCrearChart('chartEstados', {
                type: 'doughnut',
                data: {
                    labels: {{ estados_labels|safe|default:"[]" }},
                    datasets: [{
                        data: {{ estados_valores|safe|default:"[]" }},
                        backgroundColor: ['#3B82F6', '#F59E0B', '#10B981', '#EF4444', '#6B7280']
                    }]
                }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: labelColor } } } }
            });

            // 3. Sistemas
            limpiarYCrearChart('chartSistemas', {
                type: 'bar',
                data: {
                    labels: {{ sistemas_labels|safe|default:"[]" }},
                    datasets: [{ label: 'Cantidad', data: {{ sistemas_valores|safe|default:"[]" }}, backgroundColor: '#60A5FA', borderRadius: 4 }]
                }, options: chartDefaults
            });

            // 4. Prioridades
            limpiarYCrearChart('chartPrioridades', {
                type: 'bar',
                data: {
                    labels: {{ prioridades_labels|safe|default:"[]" }},
                    datasets: [{ label: 'Tickets', data: {{ prioridades_valores|safe|default:"[]" }}, backgroundColor: ['#EF4444', '#F59E0B', '#3B82F6', '#10B981'], borderRadius: 4 }]
                }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: labelColor } } } }
            });

            // ✨ 5. Gráfico de Carga de Especialistas
            limpiarYCrearChart('chartCarga', {
                type: 'bar',
                data: {
                    labels: {{ carga_labels|safe|default:"[]" }},
                    datasets: [{ label: 'Asignados', data: {{ carga_valores|safe|default:"[]" }}, backgroundColor: '#F59E0B', borderRadius: 4 }]
                }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: labelColor } } } }
            });

            // ✨ 6. Tiempos Promedio de Resolución
            limpiarYCrearChart('chartTiempos', {
                type: 'bar',
                data: {
                    labels: {{ tiempo_labels|safe|default:"[]" }},
                    datasets: [{ label: 'Horas Promedio', data: {{ tiempo_valores|safe|default:"[]" }}, backgroundColor: '#10B981', borderRadius: 4 }]
                }, options: chartDefaults
            });

            // ✨ 7. Cumplimiento de SLA por Agente
            limpiarYCrearChart('chartSlaAgentes', {
                type: 'bar',
                data: {
                    labels: {{ sla_agentes_labels|safe|default:"[]" }},
                    datasets: [{ label: '% SLA', data: {{ sla_agentes_valores|safe|default:"[]" }}, backgroundColor: '#8B5CF6', borderRadius: 4 }]
                }, options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { x: { ticks: { color: labelColor } }, y: { min: 0, max: 100, ticks: { color: labelColor } } }
                }
            });

            // ✨ 8. Impacto por Sistema (Barras Apiladas)
            limpiarYCrearChart('chartImpactoSistemas', {
                type: 'bar',
                data: {
                    labels: {{ impacto_labels|safe|default:"[]" }},
                    datasets: [
                        { label: 'Alto/Crítico', data: {{ impacto_alto|safe|default:"[]" }}, backgroundColor: '#EF4444' },
                        { label: 'Medio', data: {{ impacto_medio|safe|default:"[]" }}, backgroundColor: '#F59E0B' },
                        { label: 'Bajo', data: {{ impacto_bajo|safe|default:"[]" }}, backgroundColor: '#3B82F6' }
                    ]
                }, options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, ticks: { color: labelColor } },
                        y: { stacked: true, ticks: { color: labelColor } }
                    }
                }
            });

        })();
    </script>
</div>
