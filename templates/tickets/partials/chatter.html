{% for nota in notas %}
<div class="p-3 rounded-xl {% if nota.tipo == 'sistema' %}bg-slate-100/70 border border-slate-200/50{% else %}bg-blue-50/50 border border-blue-100/50{% endif %} text-xs space-y-1">
    <div class="flex items-center justify-between font-semibold text-slate-700">
        <span class="text-slate-900">{% if nota.autor %}{{ nota.autor.nombre_completo|default:nota.autor.username }}{% else %}Sistema{% endif %}</span>
        <span class="text-[10px] text-slate-400 font-normal">{{ nota.fecha_creacion|date:"d/m H:i" }}</span>
    </div>
    <p class="text-slate-600 leading-relaxed whitespace-pre-wrap">{{ nota.contenido }}</p>
</div>
{% empty %}
<p class="text-xs text-slate-400 text-center py-6">No hay comentarios en este ticket todavía.</p>
{% endfor %}
