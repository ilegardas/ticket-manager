<div class="p-6 space-y-4">
    <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-3">
        <h3 class="text-sm font-bold text-slate-900 dark:text-amber-400 uppercase tracking-wide">
            👤 Registrar Nuevo Usuario Manual
        </h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white font-bold text-sm">✕</button>
    </div>

    <form hx-post="{% url 'panel_usuario_crear' %}" class="space-y-4 text-xs">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Nombre Completo</label>
                <input type="text" name="nombre_completo" required placeholder="Ej. Juan Pérez López"
                       class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Correo Electrónico</label>
                <input type="email" name="correo_electronico" required placeholder="ejemplo@seech.edu.mx"
                       class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none focus:ring-2 focus:ring-amber-500">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Puesto / Cargo</label>
                <input type="text" name="puesto_cargo" placeholder="Ej. Personal de Soporte"
                       class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none">
            </div>
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Número de Empleado</label>
                <input type="text" name="numero_empleado" placeholder="Ej. 10243"
                       class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Centro de Trabajo (CCT)</label>
                <input type="text" name="cct" placeholder="Ej. 08DPR0001W"
                       class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none">
            </div>
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Región / Zona</label>
                <input type="text" name="region_zona" placeholder="Ej. Chihuahua"
                       class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Nivel Educativo</label>
                <input type="text" name="nivel_educativo" placeholder="Ej. Primarias / Especial"
                       class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 outline-none">
            </div>
            <div>
                <label class="block font-bold text-slate-400 dark:text-darkTextSub uppercase mb-1">Perfil / Rol institucional</label>
                <select name="rol" class="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-darkBg text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-amber-500 font-semibold">
                    <option value="usuario">👤 Usuario Regular (Reportante)</option>
                    <option value="tecnico">🛠️ Técnico / Especialista Mesa de Ayuda</option>
                    <option value="admin">🔮 Administrador Global del Sistema</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end gap-3 pt-3 border-t border-slate-100 dark:border-slate-800">
            <button type="button" onclick="closeModal()" class="px-4 py-2 bg-slate-100 dark:bg-darkBg text-slate-600 dark:text-slate-300 rounded-lg font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 transition">Cancelar</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 dark:bg-amber-500 text-white dark:text-slate-950 rounded-lg font-bold hover:bg-blue-500 dark:hover:bg-amber-600 transition">Crear Acceso</button>
        </div>
    </form>
</div>
