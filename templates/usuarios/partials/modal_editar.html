<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50 p-4" id="modal-edit">
    <div class="bg-white rounded-xl shadow-xl border border-slate-200 w-full max-w-md overflow-hidden animate-in fade-in zoom-in-95 duration-150">
        <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
            <h3 class="text-sm font-bold text-slate-800">Editar Información de Personal</h3>
            <button onclick="document.getElementById('modal-edit').remove()" class="text-slate-400 hover:text-slate-600 font-bold text-lg">×</button>
        </div>
        
        <form hx-post="{% url 'panel_usuario_editar' usuario.id %}" 
              hx-target="#user-row-{{ usuario.id }}" 
              hx-swap="outerHTML"
              hx-on::after-request="if(event.detail.xhr.status === 200) document.getElementById('modal-edit').remove()"
              class="p-6 space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">Nombre Completo</label>
                <input type="text" name="nombre_completo" value="{{ usuario.nombre_completo }}" required class="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Número de Empleado</label>
                    <input type="text" name="numero_empleado" value="{{ usuario.numero_empleado|default:'' }}" class="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">CCT</label>
                    <input type="text" name="cct" value="{{ usuario.cct|default:'' }}" class="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">Puesto o Cargo</label>
                <input type="text" name="puesto_cargo" value="{{ usuario.puesto_cargo|default:'' }}" class="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Nivel Educativo</label>
                    <input type="text" name="nivel_educativo" value="{{ usuario.nivel_educativo|default:'' }}" class="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Región / Zona</label>
                    <input type="text" name="region_zona" value="{{ usuario.region_zona|default:'' }}" class="w-full text-xs p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="flex justify-end gap-2 pt-2 border-t border-slate-100">
                <button type="button" onclick="document.getElementById('modal-edit').remove()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-xs font-semibold">Cancelar</button>
                <button type="submit" class="px-3 py-2 bg-slate-950 hover:bg-slate-800 text-white rounded-lg text-xs font-semibold shadow-sm">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
