<tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900/50 transition">
    <td class="py-3 px-4 font-medium text-slate-900 dark:text-slate-100">
        {{ usuario.nombre_completo }}
    </td>
    <td class="py-3 px-4 text-slate-600 dark:text-slate-400">
        {{ usuario.correo_electronico }}
    </td>
    <td class="py-3 px-4 text-center">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium 
            {% if usuario.rol == 'admin' %}
                bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300
            {% elif usuario.rol == 'tecnico' %}
                bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300
            {% else %}
                bg-slate-100 text-slate-800 dark:bg-slate-800 dark:text-slate-300
            {% endif %}">
            {{ usuario.get_rol_display|default:usuario.rol }}
        </span>
    </td>
    <td class="py-3 px-4 text-center">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium 
            {% if usuario.is_active %}
                bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300
            {% else %}
                bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300
            {% endif %}">
            {% if usuario.is_active %}Activo{% else %}Inactivo{% endif %}
        </span>
    </td>

    <td class="py-3 px-4 text-center whitespace-nowrap">
        <div class="flex items-center justify-center gap-3 text-xs">
            <button hx-get="{% url 'panel_usuario_editar' usuario.id %}" 
                    hx-target="#body-modal-box" 
                    hx-swap="innerHTML" 
                    onclick="openModal()"
                    class="text-blue-600 dark:text-cyan-400 hover:text-blue-800 dark:hover:text-cyan-300 font-bold transition hover:underline">
                📝 Editar
            </button>

            <span class="text-slate-200 dark:text-slate-800">|</span>

            <form action="{% url 'panel_usuario_eliminar' usuario.id %}" 
                  method="POST" 
                  class="inline"
                  onsubmit="return confirm('¿Estás completamente seguro de eliminar a {{ usuario.nombre_completo }}? Esta acción borrará su acceso de forma permanente.');">
                {% csrf_token %}
                <button type="submit" 
                        class="text-red-500 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 font-bold transition hover:underline">
                    🗑️ Eliminar
                </button>
            </form>
        </div>
    </td>
</tr>
